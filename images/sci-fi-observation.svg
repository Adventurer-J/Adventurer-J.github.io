<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
<title id="title">Deep-space observation</title>
<desc id="desc">A restrained science-fiction field with a planetary horizon, nebula, stars and signal trace.</desc>
<defs>
  <radialGradient id="bg" cx="68%" cy="24%" r="88%"><stop offset="0" stop-color="#182751"/><stop offset=".38" stop-color="#0a1428"/><stop offset="1" stop-color="#020509"/></radialGradient>
  <radialGradient id="nebulaA"><stop offset="0" stop-color="#496fd4" stop-opacity=".34"/><stop offset=".45" stop-color="#4d2d88" stop-opacity=".16"/><stop offset="1" stop-color="#020509" stop-opacity="0"/></radialGradient>
  <radialGradient id="nebulaB"><stop offset="0" stop-color="#1cb6b0" stop-opacity=".22"/><stop offset="1" stop-color="#020509" stop-opacity="0"/></radialGradient>
  <linearGradient id="planet" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#27455c"/><stop offset=".35" stop-color="#101d2d"/><stop offset="1" stop-color="#03070c"/></linearGradient>
  <linearGradient id="rim"><stop stop-color="#8fe9df" stop-opacity="0"/><stop offset=".48" stop-color="#8fe9df" stop-opacity=".9"/><stop offset="1" stop-color="#b6c9ff" stop-opacity="0"/></linearGradient>
  <filter id="cloud" x="-30%" y="-30%" width="160%" height="160%">
