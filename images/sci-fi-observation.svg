<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Deep-space horizon overlay</title>
  <desc id="desc">A transparent planetary horizon with restrained Red Coast signal telemetry.</desc>
  <defs>
    <linearGradient id="planet" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#17334a" stop-opacity=".78"/>
      <stop offset=".42" stop-color="#0a1725" stop-opacity=".9"/>
      <stop offset="1" stop-color="#02060b" stop-opacity=".98"/>
    </linearGradient>
    <linearGradient id="rim">
      <stop stop-color="#78ded8" stop-opacity="0"/>
      <stop offset=".45" stop-color="#78ded8" stop-opacity=".82"/>
      <stop offset=".64" stop-color="#a7bfff" stop-opacity=".64"/>
      <stop offset="1" stop-color="#a7bfff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g opacity=".18" fill="none" stroke="#86b8d1" stroke-width="1">
    <path d="M160 126H1440M160 222H1440M160 318H1440"/>
    <path d="M320 70V390M640 70V390M960 70V390M1280 70V390"/>
  </g>
  <g opacity=".3" fill="none" stroke="#78ded8" stroke-width="1">
    <circle cx="1180" cy="190" r="72"/>
    <path d="M1080 190h200M1180 90v200"/>
    <circle cx="1180" cy="190" r="5" stroke="#ff8f7a"/>
  </g>
  <ellipse cx="810" cy="970" rx="920" ry="545" fill="url(#planet)"/>
  <path d="M-80 623Q810 352 1680 623" fill="none" stroke="url(#rim)" stroke-width="3" filter="url(#glow)"/>
  <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
    <path d="M98 516H484" stroke="#ff826f" stroke-width="1" stroke-dasharray="7 10"/>
    <circle cx="98" cy="516" r="4" fill="none" stroke="#ff826f"/>
    <text x="114" y="497" fill="#ff9a86" font-size="13" letter-spacing="3">RED COAST / SIGNAL TRACE</text>
    <text x="114" y="540" fill="#6d879a" font-size="11" letter-spacing="2">ΔT 00:00:08.74 · LISTENING</text>
    <text x="1268" y="354" fill="#67859b" font-size="10" letter-spacing="2">RA 14H 39M</text>
    <text x="1268" y="374" fill="#67859b" font-size="10" letter-spacing="2">DEC −60° 50′</text>
  </g>
</svg>